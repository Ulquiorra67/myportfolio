<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up</title>

<style>
* {
    box-sizing: border-box;
    font-family: Inter, Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    background: #000;
}

/* Main layout */
.container {
    display: flex;
    width: 100%;
    overflow: hidden;
    position: relative;
}

/* LEFT PANEL (Form Slider) */
.panel {
    width: 42%;
    background: #fff;
    padding: 48px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.5s ease;
}

/* Brand */
.brand {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 40px;
}

/* Headings */
h1 {
    margin: 0;
    font-size: 28px;
}

.subtitle {
    margin: 10px 0 30px;
    color: #555;
    font-size: 14px;
}

/* Inputs */
label {
    font-size: 12px;
    margin-bottom: 6px;
    display: block;
}

input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 18px;
    border: 1px solid #000;
    border-radius: 6px;
    font-size: 14px;
}

/* Row */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    margin-bottom: 24px;
}

.row a {
    text-decoration: none;
    color: #000;
    cursor: pointer;
}

/* Buttons */
.primary-btn {
    background: #000;
    color: #fff;
    border: none;
    padding: 14px;
    width: 100%;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
}

.primary-btn:hover {
    opacity: 0.85;
}

.google-btn {
    background: #fff;
    color: #000;
    border: 1px solid #000;
    padding: 14px;
    width: 100%;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
}

/* Footer */
.footer {
    margin-top: 30px;
    font-size: 12px;
    color: #555;
}

/* RIGHT SIDE (Image) */
.right {
    width: 58%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Big image */
.right img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* Responsive */
@media (max-width: 900px) {
    .right {
        display: none;
    }
    .panel {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT PANEL (Forms) -->
    <div class="panel" id="formPanel">

        <!-- Login Form -->
        <div id="loginForm">
            <div class="brand">Kunwari Website</div>
            <h1>Welcome back</h1>
            <div class="subtitle">Please enter your details</div>

            <form onsubmit="return loginUser();">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>

                <div class="row">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a onclick="switchToSignup()">Sign Up</a>
                </div>

                <button type="submit" class="primary-btn">Sign in</button>
                <button type="button" class="google-btn">Sign in with Google</button>
            </form>
        </div>

        <!-- Sign Up Form -->
        <div id="signupForm" style="display:none;">
            <div class="brand">Kunwari Website</div>
            <h1>Create Account</h1>
            <div class="subtitle">Please enter your details</div>

            <form onsubmit="return signupUser();">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Enter your full name" required>

                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>

                <label>Confirm Password</label>
                <input type="password" id="signup-confirm-password" placeholder="••••••••" required>

                <div class="row">
                    <a onclick="switchToLogin()">Back to Login</a>
                </div>

                <button type="submit" class="primary-btn">Sign Up</button>
                <button type="button" class="google-btn">Sign up with Google</button>
            </form>
        </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="right">
        <img src="ul.jpg" alt="Side illustration">
    </div>

</div>

<script>
const formPanel = document.getElementById("formPanel");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

// Switch to signup
function switchToSignup() {
    loginForm.style.display = "none";
    signupForm.style.display = "block";
}

// Switch back to login
function switchToLogin() {
    signupForm.style.display = "none";
    loginForm.style.display = "block";
}

// Dummy login
function loginUser() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (email === "delatina1238@gmail.com" && password === "HATDOG1238") {
        alert("✅ Login successful!");
        window.location.href = "homepage.html";
    } else {
        alert("❌ Invalid email or password");
    }

    return false;
}

// Dummy signup
function signupUser() {
    const name = document.getElementById("signup-name").value;
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const confirmPassword = document.getElementById("signup-confirm-password").value;

    if (password !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return false;
    }

    alert(`✅ Account created!\nName: ${name}\nEmail: ${email}`);
    switchToLogin();
    return false;
}
</script>

</body>
</html>
